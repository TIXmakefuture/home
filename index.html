<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIX · Liquid Glass</title>
    <style>
        :root {
            --bg-deep: #08090d;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #eceef2;
            --text-secondary: #9a9ca8;
            --accent: #6b8cff;
            --radius-lg: 32px;
            --radius-md: 20px;
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            --glass-blur: blur(24px) saturate(180%);
            --dock-height: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-deep);
            font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px calc(40px + var(--dock-height) + 24px);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -20%;
            background:
                radial-gradient(circle at 20% 30%, rgba(107, 140, 255, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(160, 120, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 60% 40%, rgba(255, 110, 160, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .main-grid {
            position: relative;
            z-index: 1;
            max-width: 860px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 36px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .brand {
            display: flex;
            align-items: baseline;
            gap: 14px;
        }

        .brand-label {
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-secondary);
            opacity: 0.6;
            font-weight: 400;
        }

        .brand-tix {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            background: linear-gradient(135deg, #dfe7ff 0%, #9db5ff 50%, #c3b8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 24px rgba(130, 150, 255, 0.45));
            line-height: 1;
        }

        .xi-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 8px 18px 8px 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
            transition: all 0.3s ease;
            text-decoration: none;
            cursor: pointer;
        }
        .xi-tag:hover {
            border-color: rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 28px rgba(130, 120, 255, 0.15);
            color: #d4d6e0;
        }
        .xi-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #b3a3ff;
            box-shadow: 0 0 12px #a78bfa;
            animation: softPulse 3s ease-in-out infinite;
        }
        @keyframes softPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .liquid-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1),
                border-color 0.35s ease,
                box-shadow 0.35s ease;
            position: relative;
            overflow: hidden;
        }
        .liquid-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }
        .liquid-card>* {
            position: relative;
            z-index: 2;
        }

        .cards-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
        }

        .nav-card {
            padding: 30px 28px 26px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .nav-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 32px 60px -12px rgba(0, 0, 0, 0.65),
                0 0 0 1px rgba(255, 255, 255, 0.06) inset,
                0 0 40px rgba(107, 140, 255, 0.15);
        }
        .nav-card .icon { font-size: 2rem; margin-bottom: 4px; }
        .nav-card h3 { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.02em; }
        .nav-card p { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; }
        .card-arrow {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 6px;
            transition: gap 0.3s ease;
        }
        .nav-card:hover .card-arrow { gap: 12px; }

        .ai-panel {
            padding: 28px 30px;
            scroll-margin-top: 100px;
        }
        .ai-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .ai-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 14px #4ade80;
        }
        .ai-header h2 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.03em; }
        .chat-window {
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--radius-md);
            padding: 20px;
            min-height: 140px;
            max-height: 300px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 18px;
        }
        .msg {
            padding: 10px 16px;
            border-radius: 16px;
            max-width: 85%;
            font-size: 0.88rem;
            line-height: 1.6;
            word-break: break-word;
        }
        .msg.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #cfd1dc;
        }
        .msg.user {
            align-self: flex-end;
            background: rgba(107, 140, 255, 0.18);
            border: 1px solid rgba(107, 140, 255, 0.3);
            color: #e2e7ff;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .input-row input {
            flex: 1;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 12px 18px;
            color: var(--text-primary);
            font-size: 0.88rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-row input:focus {
            border-color: rgba(107, 140, 255, 0.45);
            box-shadow: 0 0 24px rgba(107, 140, 255, 0.1);
        }
        .input-row button {
            background: rgba(107, 140, 255, 0.12);
            border: 1px solid rgba(107, 140, 255, 0.3);
            color: #cbd2ff;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.88rem;
            cursor: pointer;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.3s ease;
            letter-spacing: 0.03em;
        }
        .input-row button:hover {
            background: rgba(107, 140, 255, 0.22);
            border-color: rgba(107, 140, 255, 0.55);
            box-shadow: 0 0 28px rgba(107, 140, 255, 0.2);
        }
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .chip {
            padding: 7px 16px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .chip:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.18);
            color: #d0d4e0;
        }

        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.4;
            letter-spacing: 0.06em;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
        }
        .footer a { color: inherit; text-decoration: none; transition: opacity 0.3s; }
        .footer a:hover { opacity: 0.8; }

        /* 底部 Dock */
        .dock-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            background: rgba(20, 20, 30, 0.45);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }
        .dock-item {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 1.5rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.22, 0.61, 0.36, 1);
            position: relative;
            border: none;
            outline: none;
        }
        .dock-item:hover {
            transform: scale(1.25);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .dock-item:active {
            transform: scale(1.1);
            transition: 0.1s;
        }

        .dock-tooltip {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            color: #fff;
            font-size: 0.75rem;
            padding: 5px 12px;
            border-radius: 8px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 10;
        }
        .dock-tooltip.show { opacity: 1; }

        @media (max-width: 600px) {
            .brand-tix { font-size: 3rem; }
            .cards-row { grid-template-columns: 1fr; }
            .main-grid { gap: 28px; }
            .dock-container { gap: 2px; padding: 6px 12px; border-radius: 24px; }
            .dock-item { width: 42px; height: 42px; font-size: 1.3rem; border-radius: 14px; }
        }
    </style>
</head>
<body>
    <div class="main-grid">
        <div class="top-bar">
            <div class="brand">
                <span class="brand-label">未来制造</span>
                <h1 class="brand-tix">TIX</h1>
            </div>
            <a class="xi-tag" href="https://www.douyin.com/user/self?from_tab_name=main" target="_blank" rel="noopener noreferrer" title="打开抖音 · 矽忈">
                <span class="xi-dot"></span>
                <span>抖音 · 矽忈</span>
            </a>
        </div>

        <div class="cards-row">
            <a class="liquid-card nav-card" href="https://tixmakefuture.github.io/actualuse" target="_blank" rel="noopener noreferrer">
                <span class="icon">🌐</span>
                <h3>正式版 · Actual</h3>
                <p>稳定版本，完整功能，适合日常使用</p>
                <span class="card-arrow">进入 <span>→</span></span>
            </a>
            <a class="liquid-card nav-card" href="https://tixmakefuture.github.io/beta" target="_blank" rel="noopener noreferrer">
                <span class="icon">🧪</span>
                <h3>测试版 · Beta</h3>
                <p>尝鲜预览，最新功能内测体验</p>
                <span class="card-arrow">进入 <span>→</span></span>
            </a>
            <!-- 小游戏卡片（占位页面） -->
            <a class="liquid-card nav-card" href="https://mcjs.cc" target="_blank" rel="noopener noreferrer">
                <span class="icon">🎮</span>
                <h3>小游戏</h3>
                <p>轻松一刻，即将上线</p>
                <span class="card-arrow">进入 <span>→</span></span>
            </a>
        </div>

        <div class="liquid-card ai-panel" id="aiSection">
            <div class="ai-header">
                <span class="ai-status"></span>
                <h2>TIX 智能指引</h2>
            </div>
            <div class="chat-window" id="chatArea">
                <div class="msg ai">👋 你好！我是 TIX 助手，可以指引你使用平台，了解版本区别，或解答关于矽忈的问题。</div>
            </div>
            <div class="input-row">
                <input type="text" id="chatInput" placeholder="输入你的问题…" autocomplete="off" />
                <button id="sendBtn">发送</button>
            </div>
            <div class="chips" id="quickChips">
                <span class="chip" data-msg="网站介绍">📌 网站介绍</span>
                <span class="chip" data-msg="版本区别">🔄 版本区别</span>
                <span class="chip" data-msg="快速上手">🚀 快速上手</span>
                <span class="chip" data-msg="关于矽忈">👤 关于矽忈</span>
            </div>
        </div>

        <div class="footer">
            <span>© 2026 TIX · 未来制造</span>
            <a href="https://tixmakefuture.github.io/actualuse" target="_blank" rel="noopener noreferrer">正式版</a>
            <a href="https://tixmakefuture.github.io/beta" target="_blank" rel="noopener noreferrer">测试版</a>
            <span>抖音 · 矽忈</span>
        </div>
    </div>

    <!-- 底部 Dock 栏 -->
    <div class="dock-container" id="dockContainer">
        <a class="dock-item" href="https://tixmakefuture.github.io/actualuse" target="_blank" rel="noopener noreferrer" data-label="正式版">🌐</a>
        <a class="dock-item" href="https://tixmakefuture.github.io/beta" target="_blank" rel="noopener noreferrer" data-label="测试版">🧪</a>
        <button class="dock-item" id="aiDockBtn" data-label="AI 指引">🤖</button>
        <a class="dock-item" href="https://www.douyin.com/user/self?from_tab_name=main" target="_blank" rel="noopener noreferrer" data-label="抖音 · 矽忈">👤</a>
    </div>

    <script>
        (function() {
            // AI 聊天逻辑
            const chatArea = document.getElementById('chatArea');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const chips = document.querySelectorAll('.chip');

            const knowledge = {
                '网站介绍': '🌐 TIX 是一个面向未来的智能平台，提供正式版、测试版以及小游戏等多个入口。正式版稳定可靠，测试版则包含最新实验功能，小游戏即将上线。',
                '版本区别': '🔄 正式版适合日常稳定使用；测试版包含前沿功能，可能存在不完善之处；小游戏为娱乐板块，当前为占位页面。',
                '快速上手': '🚀 点击“正式版”卡片或底部Dock进入主站（需双击确认），即可开始体验完整功能。小游戏卡片同样可通过双击确认进入。',
                '关于矽忈': '👤 矽忈是 TIX 团队的成员，也是抖音上的活跃创作者。点击右上角标签或底部Dock人物图标（双击确认）可访问他的抖音主页。',
                'default': '感谢你的提问！你可以输入“网站介绍”“版本区别”“快速上手”或“关于矽忈”获取指引。'
            };

            function addMessage(text, type) {
                const div = document.createElement('div');
                div.className = 'msg ' + type;
                div.textContent = text;
                chatArea.appendChild(div);
                chatArea.scrollTop = chatArea.scrollHeight;
            }

            function respond(userText) {
                if (!userText.trim()) return;
                addMessage(userText, 'user');
                const lower = userText.toLowerCase();
                let answer = knowledge['default'];
                if (lower.includes('介绍') || lower.includes('是什么')) answer = knowledge['网站介绍'];
                else if (lower.includes('版本') || lower.includes('区别') || lower.includes('正式') || lower.includes('测试'))
                    answer = knowledge['版本区别'];
                else if (lower.includes('上手') || lower.includes('开始') || lower.includes('使用')) answer = knowledge['快速上手'];
                else if (lower.includes('矽忈') || lower.includes('抖音') || lower.includes('xi')) answer = knowledge['关于矽忈'];

                setTimeout(() => {
                    addMessage(answer, 'ai');
                }, 500 + Math.random() * 400);
            }

            sendBtn.addEventListener('click', () => {
                const msg = chatInput.value;
                chatInput.value = '';
                respond(msg);
            });
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const msg = chatInput.value;
                    chatInput.value = '';
                    respond(msg);
                }
            });
            chips.forEach(chip => {
                chip.addEventListener('click', () => {
                    respond(chip.dataset.msg);
                });
            });
            chatInput.focus();

            // Dock 双击确认逻辑
            const dockItems = document.querySelectorAll('.dock-item');
            const tooltipEl = document.createElement('div');
            tooltipEl.className = 'dock-tooltip';
            document.getElementById('dockContainer').appendChild(tooltipEl);

            let activeItem = null;
            let activeTimer = null;
            const DOUBLE_CLICK_WINDOW = 1800;

            function showTooltip(item, text) {
                const rect = item.getBoundingClientRect();
                const dockRect = document.getElementById('dockContainer').getBoundingClientRect();
                tooltipEl.textContent = text;
                tooltipEl.style.left = (rect.left + rect.width/2 - dockRect.left) + 'px';
                tooltipEl.classList.add('show');
            }

            function hideTooltip() {
                tooltipEl.classList.remove('show');
            }

            function resetState() {
                activeItem = null;
                if (activeTimer) {
                    clearTimeout(activeTimer);
                    activeTimer = null;
                }
                hideTooltip();
            }

            function executeAction(item) {
                const href = item.getAttribute('href');
                if (href && item.tagName === 'A') {
                    window.open(href, item.getAttribute('target') || '_blank', 'noopener,noreferrer');
                } else if (item.id === 'aiDockBtn') {
                    document.getElementById('aiSection').scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                resetState();
            }

            dockItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    const label = this.getAttribute('data-label') || '';
                    
                    if (activeItem === this) {
                        executeAction(this);
                    } else {
                        resetState();
                        activeItem = this;
                        showTooltip(this, label);
                        activeTimer = setTimeout(() => {
                            resetState();
                        }, DOUBLE_CLICK_WINDOW);
                    }
                });
            });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.dock-item')) {
                    resetState();
                }
            });
        })();
    </script>
</body>
</html>
