<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MAKE FUTURE | 未来之境</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', 'Orbitron', sans-serif;
            color: white;
            background-color: black;
        }

        /* 动态渐变遮罩层，增加科技感 */
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.6) 90%);
        }

        /* 主内容区 - 文字和UI */
        .hero {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 100%;
            pointer-events: auto;
            animation: fadeInUp 1.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        .glitch-text {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(135deg, #aaffff, #00aaff, #aa44ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0, 160, 255, 0.5);
            animation: glitchAnim 3s infinite;
        }

        .subtitle {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            letter-spacing: 0.3em;
            margin-top: 1rem;
            font-weight: 300;
            text-transform: uppercase;
            backdrop-filter: blur(3px);
            color: #ccddff;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }

        .btn-future {
            margin-top: 2.5rem;
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.2rem;
            background: rgba(0, 20, 40, 0.6);
            border: 1.5px solid rgba(0, 255, 255, 0.8);
            color: cyan;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.4s ease;
            border-radius: 40px;
            font-family: inherit;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .btn-future:hover {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.7);
            border-color: #fff;
            color: white;
            transform: scale(1.05);
            letter-spacing: 0.3rem;
        }

        /* 底部装饰 */
        .footer-note {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: rgba(200, 220, 255, 0.6);
            z-index: 10;
            font-family: monospace;
            pointer-events: none;
            backdrop-filter: blur(2px);
        }

        /* 光晕扫描线效果 */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,255,0) 0px, rgba(0,255,255,0.03) 2px, transparent 4px);
            pointer-events: none;
            z-index: 20;
            opacity: 0.4;
        }

        /* 角落装饰 */
        .corner-badge {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 0.8rem;
            font-weight: 300;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border-left: 2px solid cyan;
            z-index: 10;
            letter-spacing: 1px;
            pointer-events: none;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate(-50%, 70%);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
                filter: blur(0);
            }
        }

        @keyframes glitchAnim {
            0%, 100% { text-shadow: 0 0 5px cyan, 0 0 10px blue; }
            5% { text-shadow: -2px 0 red, 2px 0 blue; }
            10% { text-shadow: 2px 0 cyan, -2px 0 purple; }
            15% { text-shadow: none; }
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .btn-future {
                padding: 8px 20px;
                font-size: 0.8rem;
            }
            .glitch-text {
                letter-spacing: 0.1em;
            }
            .subtitle {
                letter-spacing: 0.2em;
            }
        }

        /* 加载指示器（快速隐藏） */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            color: cyan;
            font-family: monospace;
            transition: opacity 1s;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div style="text-align:center;">
            <div style="width: 60px; height: 60px; border: 3px solid rgba(0,255,255,0.3); border-top: 3px solid cyan; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 20px;">INITIALIZING HYPERDRIVE...</p>
        </div>
    </div>

    <div class="gradient-overlay"></div>
    <div class="scan-line"></div>
    <div class="corner-badge">✦ FUTURE CORE v.∞ ✦</div>
    
    <div class="hero">
        <h1 class="glitch-text">MAKE FUTURE</h1>
        <div class="subtitle">REALITY IS A PROTOTYPE // BEYOND THE EDGE</div>
        <button class="btn-future" id="exploreBtn">EXPLORE NOW →</button>
    </div>
    <div class="footer-note">✦ IMMERSIVE REALITY ENGINE | 3D NEURAL NEXUS ✦</div>

    <!-- 引入Three.js核心库以及扩展 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118); // 深邃星空蓝黑
        scene.fog = new THREE.FogExp2(0x010118, 0.008); // 雾效增强景深
        
        // 相机: 透视相机，视野，宽高比，近平面，远平面
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 6);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        // --- 后期特效: 绽放光晕 (非常牛逼的视觉增强) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.9;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // --- 相机交互：鼠标控制视差 (模拟环绕视角)---
        let mouseX = 0;
        let mouseY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;
        let currentRotationX = 0;
        let currentRotationY = 0;
        
        window.addEventListener('mousemove', (event) => {
            // 归一化坐标 -1 到 1
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = (event.clientY / window.innerHeight) * 2 - 1;
            // 最大旋转角度约 +/- 0.5 弧度
            targetRotationY = mouseX * 0.8;
            targetRotationX = mouseY * 0.4;
        });
        
        // --- 炫酷光源系统 ---
        // 环境光
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        // 主光源：方向光
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 3, 4);
        scene.add(dirLight);
        // 背光补光，紫色
        const backLight = new THREE.PointLight(0x8822ff, 0.6);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        // 动态彩色点光源，左右旋转
        const colorLight1 = new THREE.PointLight(0xff44aa, 0.8);
        const colorLight2 = new THREE.PointLight(0x44ffaa, 0.8);
        scene.add(colorLight1);
        scene.add(colorLight2);
        
        // 中心区域光晕辅助 (添加一个虚拟球体发光层)
        const coreGlow = new THREE.PointLight(0x33aaff, 1.2, 12);
        coreGlow.position.set(0, 0, 0);
        scene.add(coreGlow);
        
        // --- 核心视觉模型: 未来感环面结 (TorusKnot) ---
        const geometry = new THREE.TorusKnotGeometry(1.1, 0.28, 180, 24, 3, 4);
        const material = new THREE.MeshStandardMaterial({
            color: 0x33ccff,
            emissive: 0x1155aa,
            emissiveIntensity: 0.8,
            metalness: 0.85,
            roughness: 0.25,
            flatShading: false
        });
        const knot = new THREE.Mesh(geometry, material);
        scene.add(knot);
        
        // 添加第二层半透明外骨骼线框，增加科技感
        const wireframeGeo = new THREE.TorusKnotGeometry(1.18, 0.31, 180, 24, 3, 4);
        const wireMat = new THREE.MeshBasicMaterial({
            color: 0x88ddff,
            wireframe: true,
            transparent: true,
            opacity: 0.25
        });
        const outerKnot = new THREE.Mesh(wireframeGeo, wireMat);
        scene.add(outerKnot);
        
        // 内部能量球体 (脉冲效果)
        const coreSphereGeo = new THREE.SphereGeometry(0.45, 32, 32);
        const coreMat = new THREE.MeshStandardMaterial({
            color: 0xff66cc,
            emissive: 0xff2288,
            emissiveIntensity: 0.9,
            metalness: 0.3,
            roughness: 0.2
        });
        const energyCore = new THREE.Mesh(coreSphereGeo, coreMat);
        scene.add(energyCore);
        
        // 添加围绕环的粒子光环(动态粒子环)
        const particleRingCount = 1800;
        const ringRadius = 1.65;
        const ringParticles = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(particleRingCount * 3);
        for (let i = 0; i < particleRingCount; i++) {
            const angle = (i / particleRingCount) * Math.PI * 2;
            const x = Math.cos(angle) * ringRadius;
            const z = Math.sin(angle) * ringRadius;
            const y = Math.sin(angle * 2) * 0.3; // 波浪形轨道
            ringPositions[i*3] = x;
            ringPositions[i*3+1] = y;
            ringPositions[i*3+2] = z;
        }
        ringParticles.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        const ringMaterial = new THREE.PointsMaterial({
            color: 0x44ddff,
            size: 0.035,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const particleRing = new THREE.Points(ringParticles, ringMaterial);
        scene.add(particleRing);
        
        // --- 绚丽粒子场: 数千个浮动粒子围绕空间 (螺旋星系感)---
        const particleCount = 4500;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleColors = new Float32Array(particleCount * 3);
        
        for (let i = 0; i < particleCount; i++) {
            // 分布在半径 2.5 到 6 之间的球形区域 + 螺旋倾向
            const radiusBase = 2.2 + Math.random() * 3.8;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            // 让部分粒子形成螺旋盘状
            let x, y, z;
            if (Math.random() > 0.6) {
                // 螺旋盘效果
                const r = 2.5 + Math.random() * 3;
                const ang = Math.random() * Math.PI * 4;
                x = Math.cos(ang) * r;
                z = Math.sin(ang) * r;
                y = Math.sin(ang * 2) * 0.8;
            } else {
                x = Math.sin(theta) * Math.cos(phi) * radiusBase;
                y = Math.sin(theta) * Math.sin(phi) * radiusBase * 0.7;
                z = Math.cos(theta) * radiusBase;
            }
            particlePositions[i*3] = x;
            particlePositions[i*3+1] = y;
            particlePositions[i*3+2] = z;
            
            // 颜色: 蓝紫青橙渐变
            const colorChoice = Math.random();
            if (colorChoice < 0.6) {
                particleColors[i*3] = 0.2 + Math.random() * 0.5;   // R
                particleColors[i*3+1] = 0.4 + Math.random() * 0.6; // G
                particleColors[i*3+2] = 0.7 + Math.random() * 0.3; // B
            } else {
                particleColors[i*3] = 0.7 + Math.random() * 0.3;
                particleColors[i*3+1] = 0.3 + Math.random() * 0.4;
                particleColors[i*3+2] = 0.8 + Math.random() * 0.2;
            }
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        const particleMat = new THREE.PointsMaterial({ size: 0.045, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
        const particleSystem = new THREE.Points(particleGeo, particleMat);
        scene.add(particleSystem);
        
        // 额外添加流动的细小粒子拖尾效果，围绕主场景 (动态粒子线)
        const trailCount = 1200;
        const trailGeo = new THREE.BufferGeometry();
        const trailPos = new Float32Array(trailCount * 3);
        for (let i = 0; i < trailCount; i++) {
            const ang = Math.random() * Math.PI * 2;
            const r = 2.0 + Math.random() * 2.4;
            trailPos[i*3] = Math.cos(ang) * r;
            trailPos[i*3+1] = Math.sin(ang * 2) * 0.5;
            trailPos[i*3+2] = Math.sin(ang) * r;
        }
        trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
        const trailMat = new THREE.PointsMaterial({ color: 0x66ccff, size: 0.025, transparent: true, blending: THREE.AdditiveBlending });
        const trailPoints = new THREE.Points(trailGeo, trailMat);
        scene.add(trailPoints);
        
        // --- 背景星辰粒子 (深邃星空)---
        const starCount = 2000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 200;
            starPos[i*3+1] = (Math.random() - 0.5) * 100;
            starPos[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // --- 额外的光柱/射线效果: 环形光晕圈---
        const ringGlowGeo = new THREE.TorusGeometry(1.45, 0.03, 64, 300);
        const glowMat = new THREE.MeshStandardMaterial({
            color: 0x22ccff,
            emissive: 0x2288ff,
            emissiveIntensity: 0.9,
            transparent: true,
            opacity: 0.7
        });
        const haloRing = new THREE.Mesh(ringGlowGeo, glowMat);
        scene.add(haloRing);
        
        const ringGlowGeo2 = new THREE.TorusGeometry(1.85, 0.02, 64, 300);
        const glowMat2 = new THREE.MeshStandardMaterial({
            color: 0xff66cc,
            emissive: 0xff44aa,
            emissiveIntensity: 0.6,
            transparent: true,
            opacity: 0.5
        });
        const haloRing2 = new THREE.Mesh(ringGlowGeo2, glowMat2);
        scene.add(haloRing2);
        
        // 创建一个动态粒子云雾 (围绕相机区域增加氛围)
        const mistParticleCount = 800;
        const mistGeo = new THREE.BufferGeometry();
        const mistPositions = new Float32Array(mistParticleCount * 3);
        for (let i = 0; i < mistParticleCount; i++) {
            mistPositions[i*3] = (Math.random() - 0.5) * 12;
            mistPositions[i*3+1] = (Math.random() - 0.5) * 6;
            mistPositions[i*3+2] = (Math.random() - 0.5) * 8 - 4;
        }
        mistGeo.setAttribute('position', new THREE.BufferAttribute(mistPositions, 3));
        const mistMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.02, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
        const mistParticles = new THREE.Points(mistGeo, mistMat);
        scene.add(mistParticles);
        
        // --- 动画与时间变量 ---
        let time = 0;
        let clock = new THREE.Clock();
        
        // 小星星独立旋转变量
        let starRotationSpeed = 0.0005;
        
        // 按钮点击交互 (简单震动反馈 + 控制台彩蛋)
        document.getElementById('exploreBtn').addEventListener('click', () => {
            // 增添瞬间闪光效果
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = 0;
            flash.style.left = 0;
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.backgroundColor = 'rgba(0,200,255,0.3)';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = 1000;
            flash.style.animation = 'fadeOut 0.5s forwards';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 500);
            
            // 增强光晕强度临时效果
            bloomPass.strength = 1.4;
            setTimeout(() => { bloomPass.strength = 0.9; }, 400);
            
            // 控制台彩蛋
            console.log("%c🚀 未来已来 | 欢迎进入超越维度 🚀", "color: cyan; font-size: 16px; font-weight: bold;");
        });
        
        // 添加CSS关键帧动画
        const styleSheet = document.createElement("style");
        styleSheet.textContent = `
            @keyframes fadeOut {
                0% { opacity: 0.8; }
                100% { opacity: 0; visibility: hidden; }
            }
        `;
        document.head.appendChild(styleSheet);
        
        // 移除加载提示
        setTimeout(() => {
            const loader = document.getElementById('loading');
            if(loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1000);
            }
        }, 800);
        
        // --- 动画循环，更新所有动态元素 ---
        function animate() {
            const delta = clock.getDelta();
            const elapsedTime = performance.now() * 0.001;
            time += delta;
            
            // 1. 核心模型的华丽旋转
            knot.rotation.x += 0.005;
            knot.rotation.y += 0.008;
            knot.rotation.z += 0.003;
            outerKnot.rotation.x = knot.rotation.x;
            outerKnot.rotation.y = knot.rotation.y;
            outerKnot.rotation.z = knot.rotation.z;
            
            // 能量球脉冲效果
            const scalePulse = 1 + Math.sin(elapsedTime * 8) * 0.04;
            energyCore.scale.set(scalePulse, scalePulse, scalePulse);
            // 内部光晕强度动态
            coreGlow.intensity = 1.0 + Math.sin(elapsedTime * 5) * 0.5;
            
            // 环状光环旋转
            haloRing.rotation.z += 0.01;
            haloRing.rotation.x += 0.005;
            haloRing2.rotation.z -= 0.008;
            haloRing2.rotation.y += 0.007;
            
            // 粒子光环整体自转
            particleRing.rotation.y += 0.01;
            particleRing.rotation.x = Math.sin(elapsedTime * 0.5) * 0.2;
            
            // 动态粒子场缓慢飘移与旋转
            particleSystem.rotation.y += 0.001;
            particleSystem.rotation.x = Math.sin(elapsedTime * 0.2) * 0.1;
            trailPoints.rotation.y -= 0.002;
            trailPoints.rotation.z += 0.001;
            
            // 背景星辰缓慢旋转
            stars.rotation.y += 0.0002;
            stars.rotation.x += 0.0001;
            
            // 动态彩色光源旋转
            colorLight1.position.x = Math.sin(elapsedTime) * 2.5;
            colorLight1.position.z = Math.cos(elapsedTime * 0.9) * 2.5;
            colorLight2.position.x = Math.sin(elapsedTime * 1.3) * 2.2;
            colorLight2.position.z = Math.cos(elapsedTime * 1.1) * 2.2;
            
            // 改变光源颜色渐变
            const hue1 = (elapsedTime * 0.3) % 1;
            const hue2 = (elapsedTime * 0.5 + 0.5) % 1;
            colorLight1.color.setHSL(hue1, 1, 0.6);
            colorLight2.color.setHSL(hue2, 1, 0.6);
            
            // 环面结材质的 emissive 强度呼吸
            material.emissiveIntensity = 0.7 + Math.sin(elapsedTime * 2.2) * 0.3;
            
            // 迷雾粒子阵整体缓慢飘移
            mistParticles.rotation.y += 0.0005;
            
            // 2. 相机平滑跟随鼠标 (视差效果)
            currentRotationX += (targetRotationX - currentRotationX) * 0.06;
            currentRotationY += (targetRotationY - currentRotationY) * 0.06;
            // 根据鼠标位置计算相机位置：球形插值
            const radius = 5.8;
            const centerX = Math.sin(currentRotationY) * Math.cos(currentRotationX) * radius;
            const centerY = Math.sin(currentRotationX) * radius * 0.7;
            const centerZ = Math.cos(currentRotationY) * Math.cos(currentRotationX) * radius;
            camera.position.x += (centerX - camera.position.x) * 0.05;
            camera.position.y += (centerY - camera.position.y) * 0.05;
            camera.position.z += (centerZ - camera.position.z) * 0.05;
            camera.lookAt(0, 0, 0);
            
            // 3. 小粒子流动效果（部分粒子位置做正弦波动，让粒子云更生动）
            const positions = particleGeo.attributes.position.array;
            // 轻微动态效果，轻微偏移螺旋轨道，为了性能不每帧全部更新，只更新少量
            // 这里做一个随机摆动效果，但为了性能仅对部分粒子做极微小偏移（可选）
            // 为了更震撼，我们每帧对trailPoints轻微偏移
            const trailPosAttr = trailGeo.attributes.position.array;
            for (let i = 0; i < trailCount; i+=5) {
                // 稍微旋转轨迹粒子使其有流动感
                const angleOffset = elapsedTime * 0.8;
                const idx = i * 3;
                let x = trailPosAttr[idx];
                let z = trailPosAttr[idx+2];
                const r = Math.hypot(x, z);
                if(r > 0.1) {
                    const newAngle = Math.atan2(z, x) + 0.008;
                    trailPosAttr[idx] = Math.cos(newAngle) * r;
                    trailPosAttr[idx+2] = Math.sin(newAngle) * r;
                }
            }
            trailGeo.attributes.position.needsUpdate = true;
            
            // 更新粒子光环的动态波浪
            const ringPosAttr = ringParticles.geometry.attributes.position.array;
            for (let i = 0; i < particleRingCount; i++) {
                const angle = (i / particleRingCount) * Math.PI * 2 + elapsedTime * 0.8;
                const x = Math.cos(angle) * ringRadius;
                const z = Math.sin(angle) * ringRadius;
                const y = Math.sin(angle * 2 + elapsedTime) * 0.35;
                ringPosAttr[i*3] = x;
                ringPosAttr[i*3+1] = y;
                ringPosAttr[i*3+2] = z;
            }
            ringParticles.geometry.attributes.position.needsUpdate = true;
            
            // 使用效果合成器渲染
            effectComposer.render();
            
            requestAnimationFrame(animate);
        }
        
        // 启动动画
        animate();
        
        // 窗口适配
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 小彩蛋控制台信息
        console.log("%c✨ THE FUTURE IS NOW // ENTER THE HYPERSPACE ✨", "color: #0ff; font-size: 14px; font-weight: bold;");
        console.log("%cDesigned with THREE.JS | 未来主义视觉体验", "color: #aaf; font-size: 12px;");
    </script>
