<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>版本选择</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f5f7;  /* 灰白底 */
            font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* 主容器 — 极致简洁 */
        .main {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        /* 毛玻璃卡片 */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 56px;
            border: 0.5px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.02), 0 0 0 0.5px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }

        /* 头部 */
        .hero {
            padding: 2rem 1.5rem 1rem;
        }
        .hero h1 {
            font-size: 2.2rem;
            font-weight: 590;
            letter-spacing: -0.3px;
            color: #1c1c1e;
        }
        .hero p {
            font-size: 0.9rem;
            color: #8e8e93;
            margin-top: 6px;
        }

        /* 版本按钮组 */
        .version-buttons {
            padding: 0 1.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .version-btn {
            background: rgba(0, 0, 0, 0.02);
            backdrop-filter: blur(8px);
            padding: 1rem 1.2rem;
            border-radius: 44px;
            cursor: pointer;
            transition: all 0.2s;
            border: 0.5px solid rgba(0, 0, 0, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .version-btn:active {
            transform: scale(0.98);
            background: rgba(0,0,0,0.06);
        }
        .btn-left {
            text-align: left;
        }
        .btn-title {
            font-size: 1.3rem;
            font-weight: 520;
            color: #1c1c1e;
            letter-spacing: -0.2px;
        }
        .btn-sub {
            font-size: 0.75rem;
            color: #8e8e93;
            margin-top: 2px;
        }
        .btn-arrow {
            font-size: 28px;
            font-weight: 300;
            color: #c6c6c8;
        }

        /* 极简小点缀 — 一条动态 */
        .charm {
            padding: 1.2rem 1.5rem 1.8rem;
            border-top: 0.5px solid rgba(0, 0, 0, 0.05);
        }
        .charm-text {
            font-size: 0.8rem;
            color: #6c6c70;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .dot {
            width: 5px;
            height: 5px;
            background: #007aff;
            border-radius: 5px;
            opacity: 0.6;
        }

        footer {
            margin-top: 1.2rem;
            font-size: 0.7rem;
            color: #a1a1a6;
        }
    </style>
</head>
<body>
<div class="main">
    <div class="glass">
        <div class="hero">
            <h1>版本选择</h1>
            <p>选择你的版本</p>
        </div>

        <div class="version-buttons">
            <!-- 正式版 -->
            <div class="version-btn" id="stableBtn">
                <div class="btn-left">
                    <div class="btn-title">正式版</div>
                    <div class="btn-sub">稳定 · 完整功能</div>
                </div>
                <div class="btn-arrow">›</div>
            </div>

            <!-- 测试版 -->
            <div class="version-btn" id="betaBtn">
                <div class="btn-left">
                    <div class="btn-title">测试版</div>
                    <div class="btn-sub">前沿 · 尝鲜体验</div>
                </div>
                <div class="btn-arrow">›</div>
            </div>
        </div>

        <!-- 只保留一句动态，不复杂 -->
        <div class="charm">
            <div class="charm-text">
                <span class="dot"></span>
                <span>存档码已支持跨设备同步</span>
                <span class="dot"></span>
            </div>
        </div>
    </div>
    <footer>轻触版本即可跳转</footer>
</div>

<script>
    const stable = document.getElementById('stableBtn');
    const beta = document.getElementById('betaBtn');

    stable.addEventListener('click', () => {
        window.location.href = 'https://tixmakefuture.github.io/actualuse/';
    });
    beta.addEventListener('click', () => {
        window.location.href = 'https://tixmakefuture.github.io/beta/';
    });
    // 可选轻触震动
    if (window.navigator?.vibrate) {
        [stable, beta].forEach(btn => {
            btn.addEventListener('click', () => window.navigator.vibrate?.(6));
        });
    }
</script>
</body>
</html>
