<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MAKE FUTURE | 未来创造者</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            background-color: #05070a;
            color: #eef5ff;
            overflow-x: hidden;
        }

        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }

        /* Canvas 背景层 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
        }

        /* 内容层 */
        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
        }

        /* Hero 区域 */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(2px);
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
        }

        .hero-title {
            font-size: clamp(2.8rem, 10vw, 5.5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #FFFFFF, #8BCBFF, #4A90E2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(74,144,226,0.3);
            margin-bottom: 1rem;
        }

        .hero-sub {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #b0e0ff;
            margin-bottom: 2.5rem;
            word-break: keep-all;
        }

        .hero-desc {
            font-size: 1rem;
            max-width: 600px;
            margin: 0 auto 2rem;
            opacity: 0.85;
            font-weight: 300;
            backdrop-filter: blur(4px);
            padding: 0 1rem;
        }

        .btn-primary {
            background: rgba(20, 30, 55, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(74, 144, 226, 0.8);
            color: #e0f0ff;
            padding: 0.9rem 2.4rem;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(74,144,226,0.2);
        }

        .btn-primary:hover {
            background: rgba(74, 144, 226, 0.25);
            border-color: #fff;
            box-shadow: 0 0 25px rgba(74,144,226,0.6);
            transform: scale(1.02);
            letter-spacing: 0.15em;
        }

        /* 内容区块 - 简介区域 */
        .insight-section {
            padding: 5rem 2rem;
            background: rgba(5, 7, 12, 0.85);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(74,144,226,0.3);
            border-bottom: 1px solid rgba(74,144,226,0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 3rem;
            letter-spacing: -0.01em;
            background: linear-gradient(120deg, #fff, #6cb2eb);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .card-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
        }

        .card {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 2rem 1.8rem;
            width: 280px;
            transition: transform 0.2s ease, border-color 0.2s;
            border: 1px solid rgba(74,144,226,0.3);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: #4A90E2;
            box-shadow: 0 20px 35px -12px rgba(74,144,226,0.2);
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .card h3 {
            font-size: 1.5rem;
            margin-bottom: 0.8rem;
            font-weight: 500;
        }

        .card p {
            font-size: 0.9rem;
            line-height: 1.5;
            opacity: 0.8;
        }

        .footer-note {
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: #6c8db0;
            background: rgba(0,0,0,0.6);
        }

        /* 滚动指示器 */
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0.7;
            transition: opacity 0.3s;
            cursor: pointer;
            z-index: 15;
        }
        .scroll-hint span {
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
        .scroll-hint .mouse {
            width: 26px;
            height: 40px;
            border: 2px solid #8bcbff;
            border-radius: 20px;
            position: relative;
        }
        .scroll-hint .mouse::after {
            content: '';
            width: 2px;
            height: 8px;
            background: #8bcbff;
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
            animation: scrollWheel 1.5s infinite;
        }
        @keyframes scrollWheel {
            0% { opacity: 1; transform: translateX(-50%) translateY(0);}
            80% { opacity: 0; transform: translateX(-50%) translateY(12px);}
            100% { opacity: 1; transform: translateX(-50%) translateY(0);}
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .card {
                width: 100%;
                max-width: 320px;
            }
            .hero-sub {
                letter-spacing: 0.2em;
            }
        }
    </style>
</head>
<body>

    <!-- Three.js Canvas 背景 -->
    <canvas id="bg-canvas"></canvas>

    <!-- 前景内容 -->
    <div class="content">
        <section class="hero-section">
            <h1 class="hero-title">MAKE FUTURE</h1>
            <div class="hero-sub">CREATE BEYOND LIMITS</div>
            <div class="hero-desc">
                我们构筑下一个世代的数字维度 — 融合人工智能、沉浸交互与极简未来主义。
            </div>
            <button class="btn-primary" id="exploreBtn">探索未来 →</button>
            <div class="scroll-hint" id="scrollHint">
                <div class="mouse"></div>
                <span>SCROLL</span>
            </div>
        </section>

        <section class="insight-section" id="insightSection">
            <div class="container">
                <div class="section-title">✦ 创 新 理 念 ✦</div>
                <div class="card-grid">
                    <div class="card">
                        <div class="card-icon">🌀</div>
                        <h3>AI 原生</h3>
                        <p>从底层融合神经网络，让创造力与算法共生，构建自适应数字生态。</p>
                    </div>
                    <div class="card">
                        <div class="card-icon">🌌</div>
                        <h3>沉浸体验</h3>
                        <p>实时3D引擎驱动，空间音频与动态交互，打造无界感官场域。</p>
                    </div>
                    <div class="card">
                        <div class="card-icon">⚡</div>
                        <h3>极简未来</h3>
                        <p>剥离冗余，保留本质。用纯粹的技术美学，定义明日的视觉语言。</p>
                    </div>
                </div>
            </div>
        </section>
        
        <div class="footer-note">
            ✦  FUTURE IS NOW  |  BEYOND THE PROTOTYPE  ✦
        </div>
    </div>

    <!-- 引入Three.js，保持高效简洁但具有未来感 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 初始化场景、相机、渲染器 (背景效果: 科技感旋转环 + 粒子场, 但保持简洁不杂乱)---
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03050b);
        scene.fog = new THREE.FogExp2(0x03050b, 0.012); // 轻微雾效，增加深邃感
        
        // 相机: 适合观看全貌
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.8, 5.5);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: false, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        
        // --- 灯光系统 (干净高级) ---
        // 环境光
        const ambient = new THREE.AmbientLight(0x111122);
        scene.add(ambient);
        // 主光源方向光
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(2, 3, 2);
        scene.add(mainLight);
        // 背光暖色补光
        const backLight = new THREE.PointLight(0x4466cc, 0.6);
        backLight.position.set(-1, 0.5, -3);
        scene.add(backLight);
        // 动态边缘光
        const rimLight = new THREE.PointLight(0x88aaff, 0.5);
        rimLight.position.set(1.5, 1, 2);
        scene.add(rimLight);
        
        // --- 核心模型: 优雅环面结 (少即是多，材质高级)---
        const geometry = new THREE.TorusKnotGeometry(0.95, 0.22, 200, 32, 3, 4);
        const material = new THREE.MeshStandardMaterial({
            color: 0x3a86ff,
            emissive: 0x0a2350,
            emissiveIntensity: 0.45,
            metalness: 0.85,
            roughness: 0.28,
            flatShading: false
        });
        const knot = new THREE.Mesh(geometry, material);
        scene.add(knot);
        
        // 半透明辅助线框 (提升科技感但不过度)
        const wireframeMat = new THREE.MeshBasicMaterial({
            color: 0x6ea8fe,
            wireframe: true,
            transparent: true,
            opacity: 0.2
        });
        const outerWire = new THREE.Mesh(new THREE.TorusKnotGeometry(1.02, 0.24, 200, 32, 3, 4), wireframeMat);
        scene.add(outerWire);
        
        // 内部能量核 (小球体，呼吸光晕)
        const coreMat = new THREE.MeshStandardMaterial({
            color: 0xffaa44,
            emissive: 0xff4422,
            emissiveIntensity: 0.6,
            metalness: 0.3,
            roughness: 0.2
        });
        const coreSphere = new THREE.Mesh(new THREE.SphereGeometry(0.35, 32, 32), coreMat);
        scene.add(coreSphere);
        
        // 围绕主体的粒子光环 (简约精致)
        const ringParticleCount = 800;
        const ringGeo = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(ringParticleCount * 3);
        const ringRadius = 1.4;
        for (let i = 0; i < ringParticleCount; i++) {
            const angle = (i / ringParticleCount) * Math.PI * 2;
            const x = Math.cos(angle) * ringRadius;
            const z = Math.sin(angle) * ringRadius;
            const y = Math.sin(angle * 2) * 0.2;
            ringPositions[i*3] = x;
            ringPositions[i*3+1] = y;
            ringPositions[i*3+2] = z;
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        const ringPointsMat = new THREE.PointsMaterial({ color: 0x5dade2, size: 0.025, transparent: true, blending: THREE.AdditiveBlending });
        const ringPoints = new THREE.Points(ringGeo, ringPointsMat);
        scene.add(ringPoints);
        
        // 星空粒子背景 (简洁深邃)
        const starCount = 1200;
        const starGeo = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 180;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 70 - 30;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.5 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // 额外悬浮粒子 (少量增加灵动感)
        const dustCount = 1500;
        const dustGeo = new THREE.BufferGeometry();
        const dustPositions = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            dustPositions[i*3] = (Math.random() - 0.5) * 12;
            dustPositions[i*3+1] = (Math.random() - 0.5) * 6;
            dustPositions[i*3+2] = (Math.random() - 0.5) * 8 - 2;
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        const dustMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.02, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const dustParticles = new THREE.Points(dustGeo, dustMat);
        scene.add(dustParticles);
        
        // 增加一个极简的环形光环(扁平圆环)
        const ringGlowGeo = new THREE.TorusGeometry(1.22, 0.02, 64, 300);
        const glowMat = new THREE.MeshStandardMaterial({
            color: 0x3a86ff,
            emissive: 0x1a44aa,
            emissiveIntensity: 0.5,
            transparent: true,
            opacity: 0.6
        });
        const halo = new THREE.Mesh(ringGlowGeo, glowMat);
        scene.add(halo);
        
        // 动画变量
        let time = 0;
        
        // 简单鼠标互动 (轻微旋转相机视角)
        let mouseX = 0;
        let mouseY = 0;
        let targetRotX = 0;
        let targetRotY = 0;
        let currentRotX = 0;
        let currentRotY = 0;
        
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = (e.clientY / window.innerHeight) * 2 - 1;
            targetRotY = mouseX * 0.3;
            targetRotX = mouseY * 0.15;
        });
        
        // 按钮滚动逻辑 (整合的体验，点击滚动到下方内容)
        const exploreBtn = document.getElementById('exploreBtn');
        const insightSection = document.getElementById('insightSection');
        const scrollHint = document.getElementById('scrollHint');
        
        function scrollToInsight() {
            insightSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            // 添加微光效反馈
            if (exploreBtn) {
                exploreBtn.style.transform = 'scale(0.98)';
                setTimeout(() => { if(exploreBtn) exploreBtn.style.transform = ''; }, 200);
            }
        }
        
        if (exploreBtn) {
            exploreBtn.addEventListener('click', scrollToInsight);
        }
        if (scrollHint) {
            scrollHint.addEventListener('click', scrollToInsight);
        }
        
        // 辅助: 呼吸灯效果和动画循环
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            
            // 核心模型旋转 (优雅匀速)
            knot.rotation.y += 0.003;
            knot.rotation.x += 0.002;
            knot.rotation.z += 0.001;
            outerWire.rotation.copy(knot.rotation);
            
            // 光环旋转
            halo.rotation.z += 0.008;
            halo.rotation.x = Math.sin(time * 0.5) * 0.1;
            ringPoints.rotation.y += 0.005;
            ringPoints.rotation.x = Math.sin(time * 0.7) * 0.1;
            
            // 核心球体脉动
            const scalePulse = 1 + Math.sin(time * 6) * 0.03;
            coreSphere.scale.set(scalePulse, scalePulse, scalePulse);
            coreSphere.material.emissiveIntensity = 0.55 + Math.sin(time * 5) * 0.2;
            
            // 动态灯光柔和变色
            rimLight.intensity = 0.55 + Math.sin(time * 1.2) * 0.2;
            backLight.intensity = 0.6 + Math.sin(time * 0.8) * 0.15;
            
            // 星群缓慢自转
            stars.rotation.y += 0.0002;
            stars.rotation.x += 0.0001;
            dustParticles.rotation.y += 0.0005;
            dustParticles.rotation.x = Math.sin(time * 0.2) * 0.05;
            
            // 相机平滑跟随鼠标产生微动效果 (高端细腻)
            currentRotX += (targetRotX - currentRotX) * 0.06;
            currentRotY += (targetRotY - currentRotY) * 0.06;
            // 计算相机位置偏移：保持中心看向原点
            const radius = 5.2;
            const camX = Math.sin(currentRotY) * radius * 0.5;
            const camY = currentRotX * 1.2;
            const camZ = radius + Math.abs(currentRotY) * 0.3;
            camera.position.x += (camX - camera.position.x) * 0.05;
            camera.position.y += (camY - camera.position.y) * 0.05;
            camera.position.z += (camZ - camera.position.z) * 0.05;
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // 窗口尺寸适配
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 小彩蛋控制台输出
        console.log("%c⚡ MAKE FUTURE // 未来已至 ⚡", "color: #4A90E2; font-size: 14px; font-weight: bold;");
        
        // 简单优化：防止按钮出现聚焦闪烁
        if(exploreBtn) exploreBtn.style.outline = 'none';
    </script>
</body>
</html>
