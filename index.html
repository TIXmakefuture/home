<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIX · 方块世界</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            border: 1px solid #222;
        }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            background: rgba(20,20,30,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .slot {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.2s;
            color: #ccc;
        }
        .slot.active {
            border-color: #6b8cff;
            background: rgba(107,140,255,0.15);
            box-shadow: 0 0 20px rgba(107,140,255,0.3);
            color: white;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 20px;
            color: #aaa;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="info">WASD 移动 | 左键破坏 | 右键放置 | 1-9 切换方块</div>
    <div id="ui">
        <div class="slot active" data-id="0">🟩</div>
        <div class="slot" data-id="1">🟫</div>
        <div class="slot" data-id="2">⬛</div>
        <div class="slot" data-id="3">🟨</div>
        <div class="slot" data-id="4">🟫</div>
        <div class="slot" data-id="5">🟦</div>
        <div class="slot" data-id="6">🍂</div>
        <div class="slot" data-id="7">💎</div>
        <div class="slot" data-id="8">🔴</div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');

            // 设置画布大小
            const W = 800;
            const H = 600;
            canvas.width = W;
            canvas.height = H;

            // 方块类型定义 (名称, 颜色, 碰撞)
            const BLOCKS = [
                { name: '草方块', color: '#5a8f3c', solid: true, icon: '🟩' },
                { name: '泥土', color: '#8b5e3c', solid: true, icon: '🟫' },
                { name: '石头', color: '#7a7a7a', solid: true, icon: '⬛' },
                { name: '沙子', color: '#e8d5a3', solid: true, icon: '🟨' },
                { name: '木板', color: '#b8946e', solid: true, icon: '🟫' },
                { name: '水', color: '#3377cc', solid: false, icon: '🟦' },
                { name: '树叶', color: '#2d6e2d', solid: true, icon: '🍂' },
                { name: '钻石矿', color: '#3de0e0', solid: true, icon: '💎' },
                { name: '红砖', color: '#b53c3c', solid: true, icon: '🔴' }
            ];
            const TILE_SIZE = 40;

            // 世界数据
            const WORLD_W = 128;
            const WORLD_H = 128;
            let world = []; // 2D 数组，存储方块ID (0-8) 或 -1 为空

            // 玩家
            let player = {
                x: 0,
                y: 0,
                size: TILE_SIZE * 0.8,
                speed: 4
            };

            // 相机
            let camera = { x: 0, y: 0 };

            // 当前选中方块
            let selectedBlock = 0;

            // 键盘状态
            const keys = {};

            // 鼠标状态
            let mouse = { x: 0, y: 0, left: false, right: false };

            // 初始化世界 (使用简单噪声生成地形)
            function generateWorld() {
                world = new Array(WORLD_W);
                for (let x = 0; x < WORLD_W; x++) {
                    world[x] = new Array(WORLD_H);
                    for (let y = 0; y < WORLD_H; y++) {
                        // 使用正弦函数叠加噪声模拟地形高度
                        let h = Math.sin(x * 0.2) * 8 + Math.sin(x * 0.05) * 15 + Math.sin(y * 0.1) * 6;
                        let surfaceY = Math.floor(WORLD_H/2 + h);
                        if (y < surfaceY - 3) {
                            world[x][y] = 2; // 深层石头
                        } else if (y < surfaceY) {
                            world[x][y] = 1; // 泥土
                        } else if (y === surfaceY) {
                            world[x][y] = 0; // 草方块
                        } else {
                            world[x][y] = -1; // 空气
                        }
                        // 偶尔生成沙子或水
                        if (world[x][y] === 0 && Math.random() < 0.05) world[x][y] = 3;
                        if (world[x][y] === -1 && y < WORLD_H/2 + 10 && Math.random() < 0.02) world[x][y] = 5; // 水
                        // 钻石矿
                        if (world[x][y] === 2 && Math.random() < 0.02) world[x][y] = 7;
                    }
                }
                // 玩家出生点寻找一个平坦的草方块位置
                let spawnX = Math.floor(WORLD_W/2);
                let spawnY = 0;
                for (let y = 0; y < WORLD_H; y++) {
                    if (world[spawnX][y] === 0) {
                        spawnY = y - 1;
                        break;
                    }
                }
                player.x = spawnX * TILE_SIZE + TILE_SIZE/2;
                player.y = spawnY * TILE_SIZE + TILE_SIZE/2;
            }

            // 获取世界坐标下的方块ID
            function getBlock(wx, wy) {
                if (wx < 0 || wx >= WORLD_W || wy < 0 || wy >= WORLD_H) return -1;
                return world[wx][wy];
            }

            // 设置世界坐标方块
            function setBlock(wx, wy, id) {
                if (wx < 0 || wx >= WORLD_W || wy < 0 || wy >= WORLD_H) return;
                world[wx][wy] = id;
            }

            // 获取鼠标指向的方块坐标 (屏幕坐标转世界坐标)
            function getTargetBlock() {
                let worldX = mouse.x + camera.x;
                let worldY = mouse.y + camera.y;
                let bx = Math.floor(worldX / TILE_SIZE);
                let by = Math.floor(worldY / TILE_SIZE);
                if (bx >= 0 && bx < WORLD_W && by >= 0 && by < WORLD_H) {
                    return { x: bx, y: by };
                }
                return null;
            }

            // 碰撞检测：玩家不能进入固体方块
            function checkCollision(px, py) {
                let half = player.size / 2;
                // 检查四个角
                let corners = [
                    [px - half, py - half],
                    [px + half, py - half],
                    [px - half, py + half],
                    [px + half, py + half]
                ];
                for (let [cx, cy] of corners) {
                    let bx = Math.floor(cx / TILE_SIZE);
                    let by = Math.floor(cy / TILE_SIZE);
                    let block = getBlock(bx, by);
                    if (block >= 0 && BLOCKS[block].solid) {
                        return true;
                    }
                }
                return false;
            }

            // 更新玩家位置
            function updatePlayer() {
                let dx = 0, dy = 0;
                if (keys['KeyW'] || keys['ArrowUp']) dy = -1;
                if (keys['KeyS'] || keys['ArrowDown']) dy = 1;
                if (keys['KeyA'] || keys['ArrowLeft']) dx = -1;
                if (keys['KeyD'] || keys['ArrowRight']) dx = 1;

                if (dx !== 0 || dy !== 0) {
                    let len = Math.sqrt(dx*dx + dy*dy);
                    dx = (dx / len) * player.speed;
                    dy = (dy / len) * player.speed;

                    // 尝试移动X
                    let newX = player.x + dx;
                    if (!checkCollision(newX, player.y)) {
                        player.x = newX;
                    }
                    // 尝试移动Y
                    let newY = player.y + dy;
                    if (!checkCollision(player.x, newY)) {
                        player.y = newY;
                    }
                }

                // 边界限制
                player.x = Math.max(TILE_SIZE/2, Math.min(WORLD_W * TILE_SIZE - TILE_SIZE/2, player.x));
                player.y = Math.max(TILE_SIZE/2, Math.min(WORLD_H * TILE_SIZE - TILE_SIZE/2, player.y));

                // 更新相机跟随
                camera.x = player.x - W/2;
                camera.y = player.y - H/2;
                camera.x = Math.max(0, Math.min(WORLD_W * TILE_SIZE - W, camera.x));
                camera.y = Math.max(0, Math.min(WORLD_H * TILE_SIZE - H, camera.y));
            }

            // 处理鼠标破坏/放置
            function handleMouseAction() {
                if (!mouse.left && !mouse.right) return;
                let target = getTargetBlock();
                if (!target) return;

                if (mouse.left) {
                    // 破坏方块
                    setBlock(target.x, target.y, -1);
                } else if (mouse.right) {
                    // 放置方块，不能放在玩家身上
                    let playerBX = Math.floor(player.x / TILE_SIZE);
                    let playerBY = Math.floor(player.y / TILE_SIZE);
                    if (target.x === playerBX && target.y === playerBY) return;
                    // 只有空位置才能放置
                    if (getBlock(target.x, target.y) === -1) {
                        setBlock(target.x, target.y, selectedBlock);
                    }
                }
                // 限制点击频率
                mouse.left = false;
                mouse.right = false;
            }

            // 绘制世界
            function draw() {
                ctx.clearRect(0, 0, W, H);
                // 背景
                ctx.fillStyle = '#0a0a15';
                ctx.fillRect(0, 0, W, H);

                // 计算可见方块范围
                let startX = Math.floor(camera.x / TILE_SIZE);
                let startY = Math.floor(camera.y / TILE_SIZE);
                let endX = Math.ceil((camera.x + W) / TILE_SIZE);
                let endY = Math.ceil((camera.y + H) / TILE_SIZE);
                startX = Math.max(0, startX);
                startY = Math.max(0, startY);
                endX = Math.min(WORLD_W, endX);
                endY = Math.min(WORLD_H, endY);

                // 绘制方块
                for (let x = startX; x < endX; x++) {
                    for (let y = startY; y < endY; y++) {
                        let blockId = world[x][y];
                        if (blockId < 0) continue;
                        let screenX = x * TILE_SIZE - camera.x;
                        let screenY = y * TILE_SIZE - camera.y;
                        ctx.fillStyle = BLOCKS[blockId].color;
                        ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                        // 网格线
                        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                        ctx.strokeRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                    }
                }

                // 绘制鼠标指向的方块高亮
                let target = getTargetBlock();
                if (target && getBlock(target.x, target.y) >= 0) {
                    let sx = target.x * TILE_SIZE - camera.x;
                    let sy = target.y * TILE_SIZE - camera.y;
                    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(sx, sy, TILE_SIZE, TILE_SIZE);
                }

                // 绘制玩家
                let playerScreenX = player.x - camera.x;
                let playerScreenY = player.y - camera.y;
                ctx.fillStyle = '#ffcc80';
                ctx.fillRect(playerScreenX - player.size/2, playerScreenY - player.size/2, player.size, player.size);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(playerScreenX - player.size/2, playerScreenY - player.size/2, player.size, player.size);
            }

            // UI 交互
            function setupUI() {
                const slots = document.querySelectorAll('.slot');
                slots.forEach(slot => {
                    slot.addEventListener('click', () => {
                        selectedBlock = parseInt(slot.dataset.id);
                        updateUI();
                    });
                });
            }

            function updateUI() {
                const slots = document.querySelectorAll('.slot');
                slots.forEach(slot => {
                    if (parseInt(slot.dataset.id) === selectedBlock) {
                        slot.classList.add('active');
                    } else {
                        slot.classList.remove('active');
                    }
                });
            }

            // 事件监听
            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                // 数字键选择方块
                if (e.code >= 'Digit1' && e.code <= 'Digit9') {
                    let index = parseInt(e.code.charAt(5)) - 1;
                    selectedBlock = index;
                    updateUI();
                }
                e.preventDefault();
            });
            window.addEventListener('keyup', e => {
                keys[e.code] = false;
                e.preventDefault();
            });

            canvas.addEventListener('mousemove', e => {
                let rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
            });
            canvas.addEventListener('mousedown', e => {
                if (e.button === 0) mouse.left = true;
                if (e.button === 2) mouse.right = true;
                e.preventDefault();
            });
            canvas.addEventListener('mouseup', e => {
                if (e.button === 0) mouse.left = false;
                if (e.button === 2) mouse.right = false;
            });
            canvas.addEventListener('contextmenu', e => e.preventDefault());

            // 游戏循环
            function gameLoop() {
                updatePlayer();
                handleMouseAction();
                draw();
                requestAnimationFrame(gameLoop);
            }

            // 启动
            generateWorld();
            setupUI();
            updateUI();
            gameLoop();

            // 窗口大小自适应（保持比例，简单起见固定尺寸）
        })();
    </script>
</body>
</html>
